<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400"
     xmlns="http://www.w3.org/2000/svg"
     role="img"
     aria-label="Seashell — MCP server for Wave Terminal">
  <title>Seashell</title>

  <defs>
    <linearGradient id="shell" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="#fed7aa"/>
      <stop offset="55%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>

    <linearGradient id="window" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="titlebar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow -->
  <rect x="22" y="44" width="356" height="316" rx="22" fill="#000" opacity="0.18"/>

  <!-- Terminal window -->
  <rect x="20" y="40" width="360" height="320" rx="22"
        fill="url(#window)" stroke="#334155" stroke-width="1"/>

  <!-- Title bar -->
  <path d="M 20,62 Q 20,40 42,40 L 358,40 Q 380,40 380,62 L 380,82 L 20,82 Z"
        fill="url(#titlebar)" opacity="0.7"/>
  <line x1="20" y1="82" x2="380" y2="82" stroke="#0b1220" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="42" cy="61" r="6" fill="#ef4444"/>
  <circle cx="62" cy="61" r="6" fill="#eab308"/>
  <circle cx="82" cy="61" r="6" fill="#22c55e"/>

  <!-- Title text -->
  <text x="200" y="66" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace"
        font-size="11" font-weight="600" fill="#64748b">seashell</text>

  <!-- Shell — stylized scallop, centered on (200, 200) -->
  <g transform="translate(200, 200)">

    <!-- Subtle warm halo behind the shell -->
    <ellipse cx="0" cy="0" rx="100" ry="105" fill="#fb923c" opacity="0.10"/>

    <!-- Body: clamshell silhouette -->
    <path d="
      M -78,5
      C -88,-28 -78,-58 -56,-74
      C -34,-90 -12,-94 0,-94
      C 12,-94 34,-90 56,-74
      C 78,-58 88,-28 78,5
      C 76,28 68,52 58,66
      C 48,76 32,82 20,84
      C 12,88 4,90 0,90
      C -4,90 -12,88 -20,84
      C -32,82 -48,76 -58,66
      C -68,52 -76,28 -78,5
      Z"
      fill="url(#shell)"
      stroke="#7c2d12"
      stroke-width="2.5"
      stroke-linejoin="round"/>

    <!-- Radial ridges (subtle, suggesting fan texture) -->
    <g stroke="#7c2d12" stroke-width="1.8" stroke-linecap="round" opacity="0.55" fill="none">
      <path d="M 0,-88 Q 0,0 0,86"/>
      <path d="M  22,-86 Q  26, 0  31,82"/>
      <path d="M -22,-86 Q -26, 0 -31,82"/>
      <path d="M  44,-78 Q  50,-2  56,68"/>
      <path d="M -44,-78 Q -50,-2 -56,68"/>
      <path d="M  62,-62 Q  68,-8  74,42"/>
      <path d="M -62,-62 Q -68,-8 -74,42"/>
      <path d="M  75,-38 Q  78,-8  80,14"/>
      <path d="M -75,-38 Q -78,-8 -80,14"/>
    </g>

    <!-- Hinge spot at top -->
    <ellipse cx="0" cy="-90" rx="7" ry="3.5" fill="#451a03"/>

    <!-- Soft highlight (upper-left) -->
    <ellipse cx="-26" cy="-48" rx="22" ry="30" fill="#fff7ed" opacity="0.22"/>
  </g>

  <!-- Prompt line at bottom -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace"
     font-size="18" font-weight="500">
    <text x="50" y="328" fill="#22d3ee">❯</text>
    <text x="72" y="328" fill="#fef3c7">seashell</text>
    <rect x="170" y="313" width="9" height="20" fill="#fef3c7" rx="1.5">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
